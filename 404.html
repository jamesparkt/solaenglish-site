<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · 페이지를 찾을 수 없어요 | SOLA 솔라원어민영어</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root { --c-primary: #E85D3C; --c-amber: #F4B860; --c-bg: #FAF6F0; --c-ink: #1A1A2A; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Pretendard Variable", "Pretendard", system-ui, sans-serif;
      background: var(--c-bg); color: var(--c-ink);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; text-align: center;
    }
    .err {
      max-width: 480px;
    }
    .num {
      font-size: 120px; font-weight: 800; line-height: 1;
      background: linear-gradient(120deg, var(--c-primary), var(--c-amber));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: -.04em;
    }
    h1 { font-size: 28px; margin: 16px 0 12px; letter-spacing: -.02em; }
    p { color: #4A4A5A; margin: 0 0 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--c-primary); color: #fff;
      padding: 14px 24px; border-radius: 999px;
      font-weight: 600; text-decoration: none;
      box-shadow: 0 12px 28px rgba(232,93,60,.25);
    }
    .btn:hover { background: #C04823; }
  </style>
</head>
<body>
  <div class="err">
    <div class="num">404</div>
    <h1>페이지를 찾을 수 없어요</h1>
    <p>주소가 잘못되었거나, 페이지가 이동되었을 수 있습니다.</p>
    <a class="btn" href="/">메인으로 돌아가기 →</a>
  </div>
</body>
</html>
